services:
  db:
    image: postgres:16-alpine
    container_name: pharmastock-db
    env_file:
      - ./backend/.env
    volumes:
      - pharmastock-data:/var/lib/postgresql/data
    networks:
      - pharmastock
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      network: host
    container_name: pharmastock-api
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    networks:
      - pharmastock
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: pharmastock-web
    ports:
      - '8080:80'
    networks:
      - pharmastock
    depends_on:
      - backend

networks:
  pharmastock:
    driver: bridge

volumes:
  pharmastock-data:
