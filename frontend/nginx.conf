# Serves the built SPA and forwards API calls to the backend container,
# mirroring the /api proxy the Vite dev server provides in development.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: any unknown path is a client-side route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
